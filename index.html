<html>
<head>
    <title>Home page</title>

    <style>

        body, html {
            margin: 0;
            height: 100%;
        }

       
        .bg-image {
            background-image: url("Fashionhouse.jpg");
            filter: blur(8px);
            -webkit-filter: blur(8px);
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }

       
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            color: white;
        }

        table {
            border-collapse: collapse;
            width: 60%;
            margin: auto;
            text-align: center;
        }

        h1 {
            font-family: fantasy;
            color: white;
            font-size: 100px;
        }

        a:hover, a:active {
            
            color: white;
              transform: scale(1.1);
            transition: 0.3s;
        }
         

        a:link, a:visited {
  background-color: white;
  color: black;
  border: 2px solid gray;
  padding: 10px 20px;
   border-radius: 100px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
} 
a:hover, a:active {
  background-color: gray;
  color: white;
}

    </style>
</head>

<body>

    <div class="bg-image"></div>

    <div class="content">
        <h1>Brand della settimana</h1>

        <table border="1">
            
                <a href="IISDAVINCI Fashion week.html" >Browse Brands</a>
           
        </table>
    </div>

</body>
</html>
